      - name: Use Existing Simulator (Stable)
        run: |
          DEVICE_ID=$(xcrun simctl list devices available \
            | grep "iPhone 16 Pro (" \
            | head -n 1 \
            | grep -Eo '[A-F0-9-]{36}')
      
          echo "Using device: $DEVICE_ID"
      
          xcrun simctl boot "$DEVICE_ID" || true
          xcrun simctl bootstatus "$DEVICE_ID" -b
      
          echo "DEVICE_ID=$DEVICE_ID" >> $GITHUB_ENV

      - name: Pre-build WebDriverAgent (FIX 🔥)
        run: |
          echo "Building WDA manually..."
      
          xcodebuild \
            -project /Users/runner/.appium/node_modules/appium-xcuitest-driver/node_modules/appium-webdriveragent/WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            build || true

