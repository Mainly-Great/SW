name: iOS Appium Test

on: 
  workflow_dispatch:
  push: 

jobs:
  ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install Appium-Python-Client selenium
      
      - name: Verify Python + Appium
        run: |
          python --version
          python -c "import appium; print('Appium OK')"

      # تثبيت Node + Appium
      - name: Install Appium
        run: |
          brew install node
          npm install -g appium
          appium driver install xcuitest
          # npm install -g appium@latest
          appium driver install uiautomator2
          # pip install Appium-Python-Client

      # تثبيت Python
      # - name: Install Python deps
      #   run: |
      #     pip install Appium-Python-Client
          # pip install Appium-Python-Client selenium

      - name: FULL Fix Xcode (IMPORTANT)
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          
          echo "Initializing Xcode..."
          sudo xcodebuild -runFirstLaunch || true
          
          echo "Waiting for iOS SDK..."
          for i in {1..10}; do
            xcrun --sdk iphonesimulator --show-sdk-version && break
            echo "Waiting SDK... ($i)"
            sleep 5
          done
          
          echo "Available SDK:"
          xcrun --sdk iphonesimulator --show-sdk-version

      # تشغيل Appium
      - name: Start Appium Server
        run: |
          nohup appium --port 4723 > appium.log 2>&1 &
          # nohup appium --base-path /wd/hub > appium.log 2>&1 &
          sleep 10

