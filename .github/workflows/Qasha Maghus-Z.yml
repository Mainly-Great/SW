name: Qasha M-Z

on: 
  workflow_dispatch:
  push: 

jobs:
  ios:
    runs-on: macos-latest

    steps: 
      - uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install Appium-Python-Client selenium
      

