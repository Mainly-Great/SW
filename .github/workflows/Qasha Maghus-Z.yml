      - name: Use Existing Simulator (Stable)
        run: |
          DEVICES=($(xcrun simctl list devices available \
            | grep -E "iPhone|iPad|Vision" \
            | grep -Eo '[A-F0-9-]{36}'))
      
          COUNT=${#DEVICES[@]}
          INDEX=$(jot -r 1 0 $((COUNT-1)))
          DEVICE_ID=${DEVICES[$INDEX]}
      
          echo "Using device: $DEVICE_ID"
      
          xcrun simctl boot "$DEVICE_ID" || true
          xcrun simctl bootstatus "$DEVICE_ID" -b
      
          echo "DEVICE_ID=$DEVICE_ID" >> $GITHUB_ENV


      - name: Open URL
        run: xcrun simctl openurl $DEVICE_ID https://cryptu-compass.netlify.app

      # انتظار تحميل الصفحة
      - name: Wait page load
        run: sleep 15

